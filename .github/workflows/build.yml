name: Build

on:
  push:
  pull_request:

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project LERN.xcodeproj \
            -scheme LERN \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            | grep -E "error:|warning:|BUILD FAILED|BUILD SUCCEEDED" | head -60
